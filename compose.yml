services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_OPTIONS: --dns-result-order=ipv4first
    expose:
      - "3000"
    labels:
      traefik.enable: "true"
      traefik.http.routers.buga-landing.rule: "Host(`buga.games`)"
      traefik.http.routers.buga-landing.entrypoints: "websecure"
      traefik.http.routers.buga-landing.tls: "true"
      traefik.http.routers.buga-landing.tls.certresolver: "letsencrypt"
      traefik.http.routers.buga-landing-web.rule: "Host(`buga.games`)"
      traefik.http.routers.buga-landing-web.entrypoints: "web"
      traefik.http.routers.buga-landing-web.middlewares: "buga-landing-https-redirect"
      traefik.http.middlewares.buga-landing-https-redirect.redirectscheme.scheme: "https"
      traefik.http.services.buga-landing.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    init: true
    stop_grace_period: 20s
    restart: unless-stopped

